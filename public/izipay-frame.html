<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago seguro · IziPay</title>

  <link rel="stylesheet"
    href="https://static.micuentaweb.pe/static/js/krypton-client/V4.0/stable/kr-payment-form.css">

  <!--
    ESTRATEGIA DEFINITIVA:
    1. NO hay <script> estático → evita CLIENT_501 (llave vacía al cargar)
    2. NO hay <div class="kr-embedded"> en el HTML → evita CLIENT_725 (auto-render)
    3. El div se crea por código DESPUÉS de setFormToken → render solo una vez
  -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      padding: 16px 20px;
      color: white;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-shield {
      background: rgba(255,255,255,.18);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-weight: 700; font-size: 14px; line-height: 1.2; }
    .header-sub   { font-size: 11px; color: rgba(191,219,254,1); margin-top: 2px; }
    .brands { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .brand-pill {
      font-size: 9px; font-weight: 700; color: rgba(255,255,255,.9);
      background: rgba(255,255,255,.15);
      padding: 2px 8px; border-radius: 6px; letter-spacing: .05em;
    }

    /* ── Body ── */
    .body { flex: 1; padding: 20px 16px; }

    /* ── Loader ── */
    #loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 16px; gap: 14px;
      color: #94a3b8; font-size: 13px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error-msg {
      display: none;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
      color: #dc2626; font-size: 13px; text-align: center; line-height: 1.5;
    }

    /* ── Form card ── */
    .form-card {
      background: white; border-radius: 16px;
      padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    /* ── KR.js button cosmético ── */
    .kr-payment-button {
      width: 100% !important;
      background: linear-gradient(135deg, #1d4ed8, #2563eb) !important;
      color: #fff !important;
      font-size: 15px !important;
      font-weight: 700 !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 14px 0 !important;
      margin-top: 10px !important;
      cursor: pointer !important;
      box-shadow: 0 4px 14px rgba(37,99,235,.28) !important;
    }
    .kr-payment-button:hover  { opacity: .92 !important; }
    .kr-payment-button:active { opacity: .80 !important; }

    /* ── Sellos ── */
    .seals {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 14px; flex-wrap: wrap;
    }
    .seal {
      display: flex; align-items: center; gap: 4px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 6px; padding: 4px 8px;
      font-size: 9px; font-weight: 700;
      color: #64748b; letter-spacing: .05em; text-transform: uppercase;
    }

    /* ── Pantalla de éxito ── */
    #success-screen {
      display: none;
      text-align: center; padding: 40px 20px;
    }
    .success-icon {
      width: 72px; height: 72px;
      background: #dcfce7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-title { font-size: 20px; font-weight: 800; color: #166534; margin-bottom: 8px; }
    .success-sub   { font-size: 13px; color: #15803d; line-height: 1.5; }
    .close-btn {
      margin-top: 24px;
      background: #16a34a; color: white;
      border: none; border-radius: 12px;
      padding: 14px 32px; font-size: 15px; font-weight: 700;
      cursor: pointer;
    }
    .close-btn:hover { opacity: .88; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-shield">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <div>
          <div class="header-title">Pago seguro</div>
          <div class="header-sub">Cifrado TLS · Powered by IziPay</div>
        </div>
      </div>
    </div>
    <div class="brands">
      <span class="brand-pill">VISA</span>
      <span class="brand-pill">Mastercard</span>
      <span class="brand-pill">AMEX</span>
      <span class="brand-pill">Diners</span>
      <span class="brand-pill">Yape QR</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Spinner: visible mientras carga -->
    <div id="loader">
      <div class="spinner"></div>
      <span>Cargando formulario seguro…</span>
    </div>

    <!-- Error técnico -->
    <div id="error-msg"></div>

    <!-- Pantalla de éxito (post-pago) -->
    <div id="success-screen">
      <div class="success-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
          stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title">¡Pago enviado!</div>
      <div class="success-sub">Tu pago fue procesado.<br>Puedes cerrar esta ventana.</div>
      <button class="close-btn" onclick="window.close()">Cerrar ventana</button>
    </div>

    <!--
      #form-container: VACÍO en el HTML.
      El <div class="kr-embedded"> se creará por código,
      DESPUÉS de setFormToken → el SDK no tiene nada que auto-renderizar.
    -->
    <div class="form-card" id="form-card" style="display:none;">
      <div id="form-container"></div>
    </div>

    <div class="seals" id="seals" style="display:none;">
      <div class="seal">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
          stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
        SSL
      </div>
      <div class="seal">VISA</div>
      <div class="seal">Mastercard</div>
      <div class="seal">PCI DSS</div>
    </div>

  </div>

  <script>
    // ── Utilidades de comunicación ──────────────────────────────────────────
    function send(msg) {
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(msg, '*');
        } else if (window.parent !== window) {
          window.parent.postMessage(msg, '*');
        }
      } catch(e) {}
    }

    function showError(msg) {
      document.getElementById('loader').style.display    = 'none';
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('seals').style.display     = 'none';
      var el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.textContent   = msg;
      send({ type: 'IZIPAY_LOAD_ERROR', message: msg });
    }

    function showSuccess() {
      document.getElementById('form-card').style.display    = 'none';
      document.getElementById('seals').style.display        = 'none';
      document.getElementById('success-screen').style.display = 'block';
      document.body.style.background = '#f0fdf4';
    }

    // ── Main ─────────────────────────────────────────────────────────────────
    var params    = new URLSearchParams(window.location.search);
    var formToken = params.get('token') || '';
    var publicKey = params.get('key')   || '';

    async function initIzipay() {
      if (!formToken || !publicKey) {
        showError('Error: parámetros de pago no recibidos. Cierra esta ventana e intenta de nuevo.');
        return;
      }

      // ── PASO 1: Cargar KR.js dinámicamente con la llave ya en el atributo ──
      // El div .kr-embedded NO existe todavía → KR.js no puede auto-renderizar
      var script = document.createElement('script');
      script.src = 'https://static.micuentaweb.pe/static/js/krypton-client/V4.0/stable/kr-payment-form.min.js';
      script.setAttribute('kr-public-key',                   publicKey);
      script.setAttribute('kr-post-url',                     'javascript:void(0);');
      script.setAttribute('kr-language',                     'es-PE');
      script.setAttribute('kr-hide-installment-number',      'true');
      script.setAttribute('kr-hide-first-installment-delay', 'true');

      script.onerror = function() {
        showError('No se pudo cargar el SDK de IziPay. Verifica tu conexión e intenta de nuevo.');
      };

      script.onload = async function() {
        try {
          // ── PASO 2: Configurar idioma y opciones ──────────────────────────
          await KR.setFormConfig({
            'kr-language':                     'es-PE',
            'kr-hide-installment-number':      'true',
            'kr-hide-first-installment-delay': 'true',
          });

          // ── PASO 3: Negociar token con IziPay ────────────────────────────
          await KR.setFormToken(formToken);

          // ── PASO 4: CREAR el div .kr-embedded AHORA (Táctica Caballo de Troya)
          // Solo en este momento el SDK tiene algo que renderizar.
          // No hubo auto-render → CLIENT_725 es imposible.
          var container = document.getElementById('form-container');
          container.innerHTML = ''; // seguridad ante F5
          var krDiv = document.createElement('div');
          krDiv.className = 'kr-embedded';
          container.appendChild(krDiv);

          // ── PASO 5: Renderizar el formulario ─────────────────────────────
          var result = await KR.renderElements('.kr-embedded');
          var krInst = (result && result.KR) ? result.KR : KR;

          // ── PASO 6: Registrar callbacks ───────────────────────────────────
          krInst.onSubmit(function(response) {
            showSuccess();
            send({ type: 'IZIPAY_SUCCESS', response: response });
            return false;
          });

          krInst.onError(function(err) {
            var msg = (err && (err.clientMessage || err.errorMessage)) || 'Error en el formulario';
            send({ type: 'IZIPAY_ERROR', message: msg });
          });

          // ── PASO 7: Mostrar formulario y ocultar spinner ──────────────────
          document.getElementById('loader').style.display    = 'none';
          document.getElementById('form-card').style.display = 'block';
          document.getElementById('seals').style.display     = 'flex';
          send({ type: 'IZIPAY_READY' });

        } catch(err) {
          showError(err.message || 'Error al inicializar el formulario de pago.');
        }
      };

      document.head.appendChild(script);
    }

    initIzipay();
  </script>
</body>
</html>
